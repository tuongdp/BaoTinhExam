substitutions:
  _REGION: asia-southeast1
  _BACKEND_SERVICE: examhub-api
  _FRONTEND_SERVICE: examhub-web
  _CLOUDSQL_INSTANCE: ""
  _CLIENT_URL: ""
  _CLIENT_URLS: ""
  _VITE_API_URL: ""
  _VITE_SOCKET_URL: ""
  _DATABASE_SECRET: examhub-database-url
  _JWT_ACCESS_SECRET: examhub-jwt-access-secret
  _JWT_REFRESH_SECRET: examhub-jwt-refresh-secret

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/backend/Dockerfile
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/examhub/backend:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/frontend/Dockerfile
      - --build-arg
      - VITE_API_URL=$_VITE_API_URL
      - --build-arg
      - VITE_SOCKET_URL=$_VITE_SOCKET_URL
      - -t
      - $_REGION-docker.pkg.dev/$PROJECT_ID/examhub/frontend:$COMMIT_SHA
      - .

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/examhub/backend:$COMMIT_SHA

  - name: gcr.io/cloud-builders/docker
    args:
      - push
      - $_REGION-docker.pkg.dev/$PROJECT_ID/examhub/frontend:$COMMIT_SHA

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_BACKEND_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/examhub/backend:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --add-cloudsql-instances=$_CLOUDSQL_INSTANCE
      - --set-env-vars=NODE_ENV=production,PORT=8080,CLIENT_URL=$_CLIENT_URL,CLIENT_URLS=$_CLIENT_URLS,ACCESS_TOKEN_TTL=15m,REFRESH_TOKEN_DAYS=7,UPLOAD_DIR=uploads
      - --set-secrets=DATABASE_URL=$_DATABASE_SECRET:latest,JWT_ACCESS_SECRET=$_JWT_ACCESS_SECRET:latest,JWT_REFRESH_SECRET=$_JWT_REFRESH_SECRET:latest

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_FRONTEND_SERVICE
      - --image=$_REGION-docker.pkg.dev/$PROJECT_ID/examhub/frontend:$COMMIT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080

images:
  - $_REGION-docker.pkg.dev/$PROJECT_ID/examhub/backend:$COMMIT_SHA
  - $_REGION-docker.pkg.dev/$PROJECT_ID/examhub/frontend:$COMMIT_SHA
