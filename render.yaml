services:
  - type: web
    name: examhub-api
    runtime: node
    rootDir: apps/backend
    plan: free
    buildCommand: npm install && npm run prisma:generate && npm run build && npm run prisma:deploy
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: examhub-db
          property: connectionString
      - key: CLIENT_URL
        value: https://your-vercel-app.vercel.app
      - key: CLIENT_URLS
        value: https://your-vercel-app.vercel.app,http://localhost:5173
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_DAYS
        value: 7
      - key: UPLOAD_DIR
        value: uploads

databases:
  - name: examhub-db
    plan: free
    databaseName: examhub
    user: examhub
