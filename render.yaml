services:
  - type: web
    name: examhub-api
    runtime: node
    rootDir: apps/backend
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run prisma:deploy && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_URL
        value: https://your-vercel-app.vercel.app
      - key: CLIENT_URLS
        value: https://your-vercel-app.vercel.app,https://your-frontend.up.railway.app,http://localhost:5173
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_DAYS
        value: 7
      - key: UPLOAD_DIR
        value: uploads
